<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="phoneShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="118" y="52" width="364" height="696" rx="8"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect x="100" y="20" width="400" height="760" rx="45" ry="45" fill="#1a1a2e" filter="url(#phoneShadow)"/>

  <!-- Phone inner bezel -->
  <rect x="108" y="28" width="384" height="744" rx="40" ry="40" fill="#0f0f1a"/>

  <!-- Screen area -->
  <rect x="118" y="52" width="364" height="696" rx="8" fill="url(#screenBg)"/>

  <!-- Content clipped to screen -->
  <g clip-path="url(#screenClip)">

    <!-- Status bar -->
    <rect x="118" y="52" width="364" height="28" fill="#1e293b"/>
    <text x="300" y="70" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">9:41</text>
    <!-- Battery icon -->
    <rect x="440" y="62" width="20" height="10" rx="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <rect x="460" y="65" width="2" height="4" rx="1" fill="#94a3b8"/>
    <rect x="442" y="64" width="14" height="6" rx="1" fill="#4ade80"/>
    <!-- Signal bars -->
    <rect x="140" y="68" width="3" height="4" rx="0.5" fill="#94a3b8"/>
    <rect x="145" y="66" width="3" height="6" rx="0.5" fill="#94a3b8"/>
    <rect x="150" y="64" width="3" height="8" rx="0.5" fill="#94a3b8"/>
    <rect x="155" y="62" width="3" height="10" rx="0.5" fill="#94a3b8"/>

    <!-- App header -->
    <rect x="118" y="80" width="364" height="68" fill="url(#headerBg)"/>
    <text x="300" y="108" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" letter-spacing="0.5">FIBREGLASS POOL CHECK</text>
    <text x="300" y="128" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">BUYER'S INSPECTION CHECKLIST</text>

    <!-- Progress bar -->
    <rect x="138" y="160" width="324" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="138" y="160" width="218" height="4" rx="2" fill="#f97316"/>
    <text x="462" y="164" text-anchor="end" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">67%</text>

    <!-- Section 1: Surface Inspection -->
    <rect x="138" y="180" width="324" height="32" rx="6" fill="#1e293b"/>
    <text x="158" y="201" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">1. SURFACE INSPECTION</text>
    <text x="442" y="201" text-anchor="end" fill="#4ade80" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">4/4</text>

    <!-- Checklist items - Section 1 -->
    <g>
      <!-- Item 1 - checked -->
      <rect x="148" y="222" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,232 156,236 163,228" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="235" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Check gelcoat for cracks or crazing</text>

      <!-- Item 2 - checked -->
      <rect x="148" y="248" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,258 156,262 163,254" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="261" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Inspect for discolouration or staining</text>

      <!-- Item 3 - checked -->
      <rect x="148" y="274" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,284 156,288 163,280" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="287" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Feel for rough patches or blistering</text>

      <!-- Item 4 - checked -->
      <rect x="148" y="300" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,310 156,314 163,306" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="313" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Check waterline for calcium buildup</text>
    </g>

    <!-- Section 2: Shell and Structure -->
    <rect x="138" y="332" width="324" height="32" rx="6" fill="#1e293b"/>
    <text x="158" y="353" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">2. SHELL &amp; STRUCTURE</text>
    <text x="442" y="353" text-anchor="end" fill="#4ade80" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">3/5</text>

    <!-- Checklist items - Section 2 -->
    <g>
      <!-- Item 1 - checked -->
      <rect x="148" y="374" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,384 156,388 163,380" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="387" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Press walls to check for flex or give</text>

      <!-- Item 2 - checked -->
      <rect x="148" y="400" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,410 156,414 163,406" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="413" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Look for bulging or deformation</text>

      <!-- Item 3 - checked -->
      <rect x="148" y="426" width="18" height="18" rx="4" fill="#f97316"/>
      <polyline points="152,436 156,440 163,432" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="439" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="12">Inspect coping and bond beam</text>

      <!-- Item 4 - unchecked -->
      <rect x="148" y="452" width="18" height="18" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="176" y="465" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Check for ground movement signs</text>

      <!-- Item 5 - unchecked -->
      <rect x="148" y="478" width="18" height="18" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="176" y="491" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Measure water level consistency</text>
    </g>

    <!-- Section 3: Fittings and Equipment -->
    <rect x="138" y="510" width="324" height="32" rx="6" fill="#1e293b"/>
    <text x="158" y="531" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">3. FITTINGS &amp; EQUIPMENT</text>
    <text x="442" y="531" text-anchor="end" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">0/4</text>

    <!-- Checklist items - Section 3 (all unchecked) -->
    <g>
      <rect x="148" y="552" width="18" height="18" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="176" y="565" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Test pump and filter operation</text>

      <rect x="148" y="578" width="18" height="18" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="176" y="591" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Check skimmer box and returns</text>

      <rect x="148" y="604" width="18" height="18" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="176" y="617" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Inspect chlorinator / salt cell</text>
    </g>

    <!-- Section 4: Red Flags (partially visible) -->
    <rect x="138" y="640" width="324" height="32" rx="6" fill="#991b1b"/>
    <text x="158" y="661" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">4. RED FLAGS</text>
    <text x="442" y="661" text-anchor="end" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">0/6</text>

    <!-- Red flags items -->
    <g>
      <rect x="148" y="682" width="18" height="18" rx="4" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="176" y="695" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Signs of structural cracking</text>

      <rect x="148" y="708" width="18" height="18" rx="4" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="176" y="721" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Evidence of major repairs or patches</text>
    </g>

    <!-- Section 5: Photography Tips (just peeking) -->
    <rect x="138" y="740" width="324" height="32" rx="6" fill="#1e293b"/>
    <text x="158" y="761" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">5. PHOTOGRAPHY TIPS</text>

  </g>

  <!-- Notch / Dynamic Island -->
  <rect x="250" y="54" width="100" height="26" rx="13" fill="#0f0f1a"/>

  <!-- Home indicator -->
  <rect x="255" y="730" width="90" height="5" rx="2.5" fill="#334155"/>
</svg>
